# Reference copy of the tmux config 10-base.sh drops at ~/.tmux.conf if absent.
# Kept in sync with the live VM config (mouse/scroll, bell pass-through, extended keys,
# focus events, code-server IPC env, full-width session names).

set -g history-limit 100000
set -g status-interval 5
setw -g aggressive-resize on

# Report terminal focus in/out to programs inside panes (Claude Code, vim, etc.).
set -g focus-events on

# Pass extended/modified keys (CSI-u / Kitty keyboard protocol) straight through
# to apps inside panes. Fresh and other modern editors use this to receive
# Alt+<letter>, Ctrl+<key>, etc.; without it tmux mangles those combos so menu
# mnemonics never arrive.
set -s extended-keys always
set -as terminal-features ',*:extkeys'

# Let the live VS Code (code-server) IPC socket flow into the tmux session env
# when you attach from an integrated terminal, so the `code` wrapper can target
# the right window.
set -ga update-environment VSCODE_IPC_HOOK_CLI

# Mouse ON. Combined with Claude Code's `"tui": "default"` (which does NOT grab
# the mouse), tmux owns the scrollback and the wheel / iPad tap-drag scrolls the
# conversation via copy-mode — cleanly, no "aN;NaNM" garbage (the garbage only
# happened when BOTH tmux mouse AND Claude's fullscreen mouse were on, or on
# click-drag). Toggle off with prefix + m if a terminal ever misbehaves.
set -g mouse on
bind m set -g mouse \; display-message "tmux mouse #{?mouse,ON,OFF}"

# Gentler mouse-wheel / tap-drag scrolling: 1 line per tick instead of tmux's
# default jump (iPad tap-drag fires many events at once and felt too jumpy).
# Bump the -N number up (e.g. 2 or 3) if it feels too slow.
bind -T copy-mode    WheelUpPane   send-keys -X -N1 scroll-up
bind -T copy-mode    WheelDownPane send-keys -X -N1 scroll-down
bind -T copy-mode-vi WheelUpPane   send-keys -X -N1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N1 scroll-down

# tmux status bar at the bottom (its default). Note: this can sit over Claude
# Code's own bottom statusline — flip to `top` if that becomes a problem again.
set -g status-position bottom

# Show the full session name incl. -2/-3 suffixes (default status-left-length 10
# truncates "[Remote-VS-Code-2]" to "[Remote-VS"). 40 covers the long folder names too.
set -g status-left-length 40

# Forward the terminal bell through tmux so Claude Code / VS Code notifications
# reach the client (e.g. macOS VS Code over Remote-SSH).
set -g monitor-bell on      # watch each window for a bell
set -g bell-action any      # propagate a bell from any window, not just the active one
set -g visual-bell off      # let the real BEL through instead of tmux's visual flash
# Pass through the terminal's bell escape to the outer terminal/editor.
set -as terminal-features ',*:bell'
set -ga terminal-overrides ',*:bel=\007'
# Visually mark a window in the status bar when it rings the bell (backup cue).
setw -g window-status-bell-style 'fg=black,bg=red,bold'
