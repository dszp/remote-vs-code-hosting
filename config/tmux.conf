# Reference copy of the tmux config 10-base.sh drops at ~/.tmux.conf if absent.
# Kept in sync with the live VM config (mouse/scroll, bell pass-through, extended keys,
# focus events, code-server IPC env, full-width session names).

set -g history-limit 100000
set -g status-interval 5
setw -g aggressive-resize on

# Report terminal focus in/out to programs inside panes (Claude Code, vim, etc.).
set -g focus-events on

# Pass extended/modified keys (CSI-u / Kitty keyboard protocol) straight through
# to apps inside panes. Fresh and other modern editors use this to receive
# Alt+<letter>, Ctrl+<key>, etc.; without it tmux mangles those combos so menu
# mnemonics never arrive.
set -s extended-keys always
set -as terminal-features ',*:extkeys'

# Let the live VS Code (code-server) IPC socket flow into the tmux session env
# when you attach from an integrated terminal, so the `code` wrapper can target
# the right window.
set -ga update-environment VSCODE_IPC_HOOK_CLI

# Mouse ON by default — tmux owns the scrollback; wheel / iPad tap-drag scrolls
# via copy-mode. BUT Claude Code now runs `"tui": "fullscreen"` and grabs the
# mouse too (so you can click its UI). tmux-mouse-ON + Claude-fullscreen-mouse-ON
# at the SAME time is what produces the "aN;NaNM" click-drag garbage — only ONE
# layer should own the mouse. So when you're in fullscreen Claude and want to
# click, toggle tmux mouse OFF with prefix + m (status bar shows MOUSE ON/OFF);
# flip it back ON for wheel scrollback in plain shells. Selecting text to copy
# always works via Shift-drag (ghostty's native selection) regardless of either.
set -g mouse on
bind m set -g mouse \; display-message "tmux mouse #{?mouse,ON,OFF}"

# Gentler mouse-wheel / tap-drag scrolling: 1 line per tick instead of tmux's
# default jump (iPad tap-drag fires many events at once and felt too jumpy).
# Bump the -N number up (e.g. 2 or 3) if it feels too slow.
bind -T copy-mode    WheelUpPane   send-keys -X -N1 scroll-up
bind -T copy-mode    WheelDownPane send-keys -X -N1 scroll-down
bind -T copy-mode-vi WheelUpPane   send-keys -X -N1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N1 scroll-down

# tmux status bar at the bottom (its default). Note: this can sit over Claude
# Code's own bottom statusline — flip to `top` if that becomes a problem again.
set -g status-position bottom

# Show the full session name incl. -2/-3 suffixes (default status-left-length 10
# truncates "[Remote-VS-Code-2]" to "[Remote-VS"). 40 covers the long folder names too.
set -g status-left-length 40

# Mouse-state indicator on the right of the status bar, so you can always see
# which layer owns the mouse (toggle with prefix + m). Green MOUSE ON = tmux owns
# it (wheel scrollback works); red MOUSE OFF = handed to Claude fullscreen /
# native selection. Refreshes every status-interval (5s); prefix + m also prints it.
set -g status-right "#{?mouse,#[fg=black#,bg=green#,bold] MOUSE ON #[default],#[fg=white#,bg=red#,bold] MOUSE OFF #[default]} %H:%M %d-%b "
set -g status-right-length 40

# Forward the terminal bell through tmux so Claude Code / VS Code notifications
# reach the client (e.g. macOS VS Code over Remote-SSH).
set -g monitor-bell on      # watch each window for a bell
set -g bell-action any      # propagate a bell from any window, not just the active one
set -g visual-bell off      # let the real BEL through instead of tmux's visual flash
# Pass through the terminal's bell escape to the outer terminal/editor.
set -as terminal-features ',*:bell'
set -ga terminal-overrides ',*:bel=\007'
# Visually mark a window in the status bar when it rings the bell (backup cue).
setw -g window-status-bell-style 'fg=black,bg=red,bold'

# --- OSC 52 system-clipboard bridge ---------------------------------------
# With set-clipboard on, copying in copy-mode (mouse drag-end OR keyboard yank)
# also emits an OSC 52 escape that the OUTER terminal (ghostty) writes to your
# LOCAL clipboard -- so a copy made on this remote host lands on your Mac/iPad.
# Uses the existing default MouseDragEnd1Pane -> copy-selection-and-cancel, which
# already honors set-clipboard, so no extra mouse binding is needed.
#
# Client side: ghostty needs `clipboard-write = allow` in its config.
#
# IMPORTANT: this only works over plain SSH. Mainline mosh (1.4.x) parses and
# DROPS OSC 52, so over a mosh session this silently does nothing -- fall back to
# Shift-drag (ghostty's own native selection) there. Prefer ssh when you're
# copying a lot over a reliable link.
set -g set-clipboard on
# Advertise the clipboard (Ms) capability for every outer terminal, so tmux
# actually emits OSC 52 regardless of the client's $TERM (xterm-ghostty, screen,
# etc.). Without this tmux may stay silent if the client TERM lacks Ms.
set -as terminal-features ',*:clipboard'
